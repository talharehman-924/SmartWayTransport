<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartWay Transport Voucher</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --secondary: #64748b;
  --accent: #10b981;
  --accent-dark: #059669;
  --background: #f8fafc;
  --surface: #ffffff;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

body{
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 20px;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

.wrap{
  max-width: 1000px;
  margin: 0 auto;
}

.controls{
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

button{
  background: var(--primary);
  color: white;
  padding: 12px 20px;
  border: 0;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
  box-shadow: var(--shadow);
}

button:hover{
  background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

/* Pagination button styles */
.pagination-btn {
  background: var(--accent);
  color: white;
  padding: 8px 16px;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
  box-shadow: var(--shadow);
}

.pagination-btn:hover:not(:disabled) {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.pagination-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.card{
  background: var(--surface);
  border-radius: 20px;
  padding: 32px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: visible;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}

.header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.header img{
  height: 200px;
  filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
}

.title{
  text-align: right;
  font-size: 24px;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: -0.025em;
}

.section{
  margin-top: 24px;
  padding: 16px 20px;
  border-radius: 16px;
  background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
  color: white;
  font-weight: 700;
  word-break: break-word;
  font-size: 16px;
  letter-spacing: 0.025em;
  box-shadow: var(--shadow);
}

.grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 16px;
}

label{
  font-weight: 700;
  color: var(--text-secondary);
}

.grid > div > label{
  display: block;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

input, select, textarea{
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid var(--border);
  box-sizing: border-box;
  line-height: 1.5;
  font-family: inherit;
  font-size: 14px;
  transition: all 0.2s ease;
  background: var(--surface);
  color: var(--text-primary);
}

input:focus, select:focus, textarea:focus{
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

textarea{
  resize: none;
}

.routesTable{
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.routesTable th{
  background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
  color: white;
  padding: 16px;
  text-align: left;
  font-weight: 600;
}

.routesTable td{
  padding: 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.footer{
  margin-top: 32px;
  padding-top: 24px;
  text-align: center;
  color: var(--text-secondary);
  border-top: 2px dashed var(--primary);
  font-size: 14px;
}

.footer > div:first-child{
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 16px;
  white-space: nowrap;
}

 .contact-links {
   display: flex;
   flex-direction: column;
   gap: 12px;
   margin-bottom: 20px;
 }

 .contact-row {
   display: flex;
   gap: 20px;
   justify-content: center;
   flex-wrap: wrap;
 }

.contact-item {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
  transition: all 0.2s ease;
  background: rgba(37, 99, 235, 0.05);
  border: 1px solid rgba(37, 99, 235, 0.1);
}

.contact-item:hover {
  background: rgba(37, 99, 235, 0.1);
  border-color: rgba(37, 99, 235, 0.2);
  color: var(--primary);
  transform: translateY(-1px);
}

.contact-item svg {
  color: var(--primary);
  flex-shrink: 0;
}

.social-links {
  display: flex;
  gap: 16px;
  justify-content: center;
}

.social-item {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 8px;
  transition: all 0.2s ease;
  background: rgba(37, 99, 235, 0.05);
  border: 1px solid rgba(37, 99, 235, 0.1);
  font-weight: 500;
}

.social-item:hover {
  background: rgba(37, 99, 235, 0.1);
  border-color: rgba(37, 99, 235, 0.2);
  color: var(--primary);
  transform: translateY(-1px);
}

.social-item svg {
  color: var(--primary);
  flex-shrink: 0;
}

.watermark{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.25;
  pointer-events: none;
  z-index: 0;
  width: 50%;
  height: auto;
}

.fakeField{
  display: block;
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  box-sizing: border-box;
  background: var(--surface);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 48px;
  overflow: visible;
  word-wrap: break-word;
  font-family: inherit;
  font-size: 14px;
}
</style>
</head>

// Function to format time with AM/PM
function formatTimeWithAMPM(timeString) {
  if (!timeString) return '';
  const [hours, minutes, seconds] = timeString.split(':');
  const hour = parseInt(hours);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const displayHour = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
  return `${displayHour.toString().padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
}

}

// ---------- Passengers with Pagination ----------
let passengerCount = 0;
let passengersPerPage = 3; // Show 3 passengers per page
let currentPassengerPage = 1;
let allPassengers = [];

function addPassenger(prefill={}) {
  passengerCount++;
  const passenger = {
    id: passengerCount,
    name: prefill.name || '',
    cnic: prefill.cnic || '',
    passport: prefill.passport || '',
    dob: prefill.dob || '',
    contact: prefill.contact || '',
    nationality: prefill.nationality || ''
  };
  
  allPassengers.push(passenger);
  renderPassengers();
}

function removePassenger(passengerId) {
  allPassengers = allPassengers.filter(p => p.id !== passengerId);
  passengerCount = allPassengers.length;
  
  // Adjust current page if needed
  const totalPages = Math.ceil(allPassengers.length / passengersPerPage);
  if (currentPassengerPage > totalPages && totalPages > 0) {
    currentPassengerPage = totalPages;
  }
  
  renderPassengers();
}

function renderPassengers() {
  const wrapper = document.getElementById('passengersWrapper');
  wrapper.innerHTML = '';
  
  // Update passenger count display
  const passengerCountElement = document.getElementById('passengerCount');
  if (passengerCountElement) {
    passengerCountElement.textContent = allPassengers.length;
  }
  
  const startIndex = (currentPassengerPage - 1) * passengersPerPage;
  const endIndex = startIndex + passengersPerPage;
  const passengersToShow = allPassengers.slice(startIndex, endIndex);
  
  passengersToShow.forEach(passenger => {
    const div = document.createElement('div');
    div.style.border='1px solid #ccc'; 
    div.style.padding='8px'; 
    div.style.marginTop='6px';
    div.style.display='grid'; 
    div.style.gridTemplateColumns='repeat(3,1fr)'; 
    div.style.gap='8px';
    div.innerHTML = `
      <div><label>Passenger Name</label><input value="${passenger.name}" onchange="updatePassenger(${passenger.id}, 'name', this.value)"></div>
      <div><label>Passport Number</label><input value="${passenger.passport}" onchange="updatePassenger(${passenger.id}, 'passport', this.value)"></div>
      <div><label>Date of Birth</label><input type="date" value="${passenger.dob}" onchange="updatePassenger(${passenger.id}, 'dob', this.value)"></div>
      <div><label>Contact No</label><input value="${passenger.contact}" onchange="updatePassenger(${passenger.id}, 'contact', this.value)"></div>
      <div><label>Nationality</label><input value="${passenger.nationality}" onchange="updatePassenger(${passenger.id}, 'nationality', this.value)"></div>
      <div style="grid-column: span 3;"><button type="button" onclick="removePassenger(${passenger.id})" style="background:#ef4444;margin-top:12px;border-radius:8px;">Remove Passenger</button></div>
    `;
    wrapper.appendChild(div);
  });
  
  // Add pagination controls
  addPassengerPagination();
}

function updatePassenger(passengerId, field, value) {
  const passenger = allPassengers.find(p => p.id === passengerId);
  if (passenger) {
    passenger[field] = value;
  }
}

function addPassengerPagination() {
  const wrapper = document.getElementById('passengersWrapper');
  const totalPages = Math.ceil(allPassengers.length / passengersPerPage);
  
  if (totalPages <= 1) return;
  
  const paginationDiv = document.createElement('div');
  paginationDiv.style.gridColumn = 'span 3';
  paginationDiv.style.marginTop = '16px';
  paginationDiv.style.textAlign = 'center';
  paginationDiv.style.display = 'flex';
  paginationDiv.style.justifyContent = 'center';
  paginationDiv.style.alignItems = 'center';
  paginationDiv.style.gap = '8px';
  
  // Previous button
  const prevBtn = document.createElement('button');
  prevBtn.textContent = '← Previous';
  prevBtn.disabled = currentPassengerPage === 1;
  prevBtn.className = 'pagination-btn';
  prevBtn.onclick = () => {
    if (currentPassengerPage > 1) {
      currentPassengerPage--;
      renderPassengers();
    }
  };
  
  // Page info
  const pageInfo = document.createElement('span');
  const startIndex = (currentPassengerPage - 1) * passengersPerPage + 1;
  const endIndex = Math.min(currentPassengerPage * passengersPerPage, allPassengers.length);
  pageInfo.textContent = `Showing ${startIndex}-${endIndex} of ${allPassengers.length} passengers (Page ${currentPassengerPage} of ${totalPages})`;
  pageInfo.style.padding = '8px 16px';
  pageInfo.style.fontWeight = '600';
  pageInfo.style.color = 'var(--text-secondary)';
  
  // Next button
  const nextBtn = document.createElement('button');
  nextBtn.textContent = 'Next →';
  nextBtn.disabled = currentPassengerPage === totalPages;
  nextBtn.className = 'pagination-btn';
  nextBtn.onclick = () => {
    if (currentPassengerPage < totalPages) {
      currentPassengerPage++;
      renderPassengers();
    }
  };
  
  paginationDiv.appendChild(prevBtn);
  paginationDiv.appendChild(pageInfo);
  paginationDiv.appendChild(nextBtn);
  wrapper.appendChild(paginationDiv);
}

// ---------- Collect Data ----------
function collectData() {
  // Passenger data
  const passengers = allPassengers.map(passenger => ({
    name: passenger.name,
    cnic: passenger.cnic,
    passport: passenger.passport,
    dob: passenger.dob,
    contact: passenger.contact,
    nationality: passenger.nationality
  }));

  // Routes data (dynamic)
  const routes = Array.from(document.getElementById('routesWrapper').children).map(div => {
    const pickup = div.querySelector('.pickupLocation')?.value || '';
    const pickupDate = div.querySelector('.pickupDate')?.value || '';
    const pickupTime = div.querySelector('.pickupTime')?.value || '';
    const dropoff = div.querySelector('.dropoffLocation')?.value || '';
    const advance = div.querySelector('.advance')?.value || '';
    const total = div.querySelector('.total')?.value || '';
    const duration = div.querySelector('.duration')?.value || '';

    // Locations checkboxes
    const locations = Array.from(div.querySelectorAll('input.locations:checked')).map(cb => cb.value);

    return { pickup, pickupDate, pickupTime, dropoff, advance, total, duration, locations };
  });

  // Return complete data object
  return {
    passengerId: document.getElementById('passengerId').value,
    srNo: document.getElementById('srNo').value,
    voucherDate: document.getElementById('voucherDate').value,
    voucherTime: document.getElementById('voucherTime').value,
    bookingStatus: document.getElementById('bookingStatus').value,
    approvedBy: document.getElementById('approvedBy').value,
    vehicleType: document.getElementById('vehicleType').value,
    numPassengers: document.getElementById('numPassengers').value,
    specialRequest: document.getElementById('specialRequest').value,
    passengers,
    routes
  };
}

document.getElementById('btnJson').addEventListener('click',()=>{

  saveAs(blob,`voucher_${data.srNo}.json`);
});

// ---------- Save Excel ----------
document.getElementById('btnExcel').addEventListener('click',()=>{

  const data = collectData();
  saveRecord(data);

  const allRecords = JSON.parse(localStorage.getItem("voucherRecords")) || [];

  // ------ FIND MAX PASSENGERS & MAX ROUTES --------
  let maxPassengers = 0;
  let maxRoutes = 0;

  allRecords.forEach(r => {
    if (r.passengers && r.passengers.length > maxPassengers)
        maxPassengers = r.passengers.length;

    if (r.routes && r.routes.length > maxRoutes)
        maxRoutes = r.routes.length;
  });

  // -------- FLATTEN RECORDS --------
  const flatRecords = allRecords.map(r => {
    const flat = {
      passengerId: r.passengerId,
      srNo: r.srNo,
      voucherDate: r.voucherDate,
      voucherTime: r.voucherTime,
      bookingStatus: r.bookingStatus,
      approvedBy: r.approvedBy,
      vehicleType: r.vehicleType,
      numPassengers: r.numPassengers,
      specialRequest: r.specialRequest
    };

    // ---- Expand passengers ----
    for (let i = 0; i < maxPassengers; i++) {
      const p = r.passengers[i] || { name:"", cnic:"", passport:"", dob:"", contact:"", nationality:"" };

      flat[`pass${i+1}_name`] = p.name;
      flat[`pass${i+1}_cnic`] = p.cnic;
      flat[`pass${i+1}_passport`] = p.passport;
      flat[`pass${i+1}_dob`] = p.dob;
      flat[`pass${i+1}_contact`] = p.contact;
      flat[`pass${i+1}_nationality`] = p.nationality;
    }

    // ---- Expand routes ----
    for (let i = 0; i < maxRoutes; i++) {
      const rt = r.routes[i] || { pickup:"", pickupDate:"", pickupTime:"", dropoff:"", advance:"", total:"" };

      flat[`route${i+1}_pickup`] = rt.pickup;
      flat[`route${i+1}_pickupDate`] = rt.pickupDate;
      flat[`route${i+1}_pickupTime`] = rt.pickupTime;
      flat[`route${i+1}_dropoff`] = rt.dropoff;
      flat[`route${i+1}_advance`] = rt.advance;
      flat[`route${i+1}_total`] = rt.total;
    }

    return flat;
  });

  // ---- CREATE EXCEL ----
  const ws = XLSX.utils.json_to_sheet(flatRecords);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Voucher Records');

  XLSX.writeFile(wb, 'All_Vouchers_Expanded.xlsx');
});

function saveRecord(newData) {
  let records = JSON.parse(localStorage.getItem("voucherRecords")) || [];
  records.push(newData);
  localStorage.setItem("voucherRecords", JSON.stringify(records));
}

// ---------- Download PDF (1 Page Fit) ----------
document.getElementById('btnPdf').addEventListener('click', async()=>{
  const controls = document.querySelector('.controls');
  const voucher = document.getElementById('voucherCard');

  // Build a clean clone with static text for all form fields
  const clone = voucher.cloneNode(true);
  clone.id = 'voucherCardExport';
  clone.style.position = 'fixed';
  clone.style.left = '-10000px';
  clone.style.top = '0';
  clone.style.width = voucher.offsetWidth + 'px';
  clone.style.zIndex = '9999';

  const replaceField = (el, value) => {
    const span = document.createElement('span');
    span.className = 'fakeField';
    
    // Format time fields with AM/PM
    let displayValue = value || ' ';
    if (el.id === 'voucherTime' && value) {
      displayValue = formatTimeWithAMPM(value);
    }
    
    span.textContent = displayValue;
    // Match approximate height
    const style = getComputedStyle(el);
    span.style.minHeight = style.height;
    span.style.font = style.font;
    span.style.whiteSpace = 'pre-wrap';
    span.style.alignItems = 'center';
    span.style.display = 'block';
    // Ensure consistent padding and sizing
    span.style.padding = style.padding;
    span.style.width = '100%';
    span.style.boxSizing = 'border-box';
    el.replaceWith(span);
  };

  // Map values from original to clone
  const origInputs = voucher.querySelectorAll('input, select, textarea');
  const cloneInputs = clone.querySelectorAll('input, select, textarea');
  cloneInputs.forEach((clonedEl, idx) => {
    const src = origInputs[idx];
    if (!src) return;
    let val;
    if (src.tagName === 'SELECT') {
      val = src.options[src.selectedIndex]?.text || src.value;
    } else {
      val = src.value;
    }
    replaceField(clonedEl, val);
  });

  // Preserve footer styling exactly as it appears on the webpage
  const footerLinks = clone.querySelectorAll('.footer a');
  footerLinks.forEach(link => {
    // Keep original styling but remove clickable functionality
    link.style.pointerEvents = 'none';
    link.style.cursor = 'default';
  });
  
  // Force footer layout using CSS Grid for better PDF compatibility
  const contactRow = clone.querySelector('.contact-row');
  if (contactRow) {
    contactRow.style.display = 'grid';
    contactRow.style.gridTemplateColumns = 'auto auto auto';
    contactRow.style.gap = '20px';
    contactRow.style.justifyContent = 'center';
    contactRow.style.alignItems = 'center';
    contactRow.style.width = '100%';
    contactRow.style.textAlign = 'center';
  }
  
  // Ensure each contact item maintains its styling
  const contactItems = clone.querySelectorAll('.contact-item');
  contactItems.forEach(item => {
    item.style.display = 'inline-block';
    item.style.verticalAlign = 'top';
    item.style.padding = '8px 12px';
    item.style.borderRadius = '8px';
    item.style.background = 'rgba(37, 99, 235, 0.05)';
    item.style.border = '1px solid rgba(37, 99, 235, 0.1)';
    item.style.color = 'var(--text-secondary)';
    item.style.textDecoration = 'none';
    item.style.whiteSpace = 'nowrap';
    item.style.margin = '0 10px';
  });
  
  const socialLinks = clone.querySelector('.social-links');
  if (socialLinks) {
    socialLinks.style.display = 'grid';
    socialLinks.style.gridTemplateColumns = 'auto auto';
    socialLinks.style.gap = '16px';
    socialLinks.style.justifyContent = 'center';
    socialLinks.style.alignItems = 'center';
    socialLinks.style.width = '100%';
    socialLinks.style.textAlign = 'center';
  }
  
  // Ensure each social item maintains its styling
  const socialItems = clone.querySelectorAll('.social-item');
  socialItems.forEach(item => {
    item.style.display = 'inline-block';
    item.style.verticalAlign = 'top';
    item.style.padding = '10px 16px';
    item.style.borderRadius = '8px';
    item.style.background = 'rgba(37, 99, 235, 0.05)';
    item.style.border = '1px solid rgba(37, 99, 235, 0.1)';
    item.style.color = 'var(--text-secondary)';
    item.style.textDecoration = 'none';
    item.style.fontWeight = '500';
    item.style.whiteSpace = 'nowrap';
    item.style.margin = '0 8px';
  });
  
  // Fix footer text formatting to prevent line breaks while keeping original style
  const footerTexts = clone.querySelectorAll('.footer div:not(.contact-links):not(.social-links)');
  footerTexts.forEach(text => {
    text.style.whiteSpace = 'nowrap';
    text.style.display = 'block';
  });

  // Ensure footer stays at bottom
  clone.style.display = 'flex';
  clone.style.flexDirection = 'column';
  clone.style.minHeight = '100vh';
  
  const footer = clone.querySelector('.footer');
  if (footer) {
    footer.style.marginTop = 'auto';
    footer.style.paddingTop = '24px';
  }

  document.body.appendChild(clone);
  controls.style.display='none';
  try{
    const canvas = await html2canvas(clone,{scale:1.5,allowTaint:true,logging:false,backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/jpeg',0.95);
  const pdf = new jspdf.jsPDF('p','mm','a4');
  const pdfWidth = pdf.internal.pageSize.getWidth();
  const pdfHeight = pdf.internal.pageSize.getHeight();
  
  // Calculate scaling to fit content on one A4 page
  const imgW = canvas.width;
  const imgH = canvas.height;
  
  // Scale to fit width or height, whichever is smaller
  const scaleX = pdfWidth / imgW;
  const scaleY = pdfHeight / imgH;
  const scale = Math.min(scaleX, scaleY) * 0.95; // 95% to ensure margins
  
  const finalWidth = imgW * scale;
  const finalHeight = imgH * scale;
  
  // Center the content on the page
  const x = (pdfWidth - finalWidth) / 2;
  const y = (pdfHeight - finalHeight) / 2;
  
  pdf.addImage(imgData,'JPEG',x,y,finalWidth,finalHeight);
    
    pdf.save(`voucher_${document.getElementById('srNo').value}.pdf`);
  } finally {
    controls.style.display='flex';
    clone.remove();
  }
});

// Function to create new Excel file
function createNewExcelFile(data) {
  const ws = XLSX.utils.json_to_sheet([data]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Vouchers');
  XLSX.writeFile(wb, `voucher_${data.srNo}.xlsx`);
  alert('New Excel file created successfully!');
}

// Override the Excel save button to save to existing files
document.getElementById('btnExcel').onclick = function() {
  const data = collectData();
  
  // Try to load existing Excel file first
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls';
  input.style.display = 'none';
  
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (file) {
      // Load existing file and append data
      const reader = new FileReader();
      reader.onchange = function(e) {
        try {
          const workbook = XLSX.read(e.target.result, { type: 'array' });
          
          // Check if 'Vouchers' sheet exists, if not create it
          let worksheet = workbook.Sheets['Vouchers'];
          if (!worksheet) {
            worksheet = XLSX.utils.json_to_sheet([]);
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Vouchers');
          }
          
          // Convert existing sheet to JSON
          const existingData = XLSX.utils.sheet_to_json(worksheet);
          
          // Add new voucher data
          existingData.push(data);
          
          // Convert back to sheet
          const newWorksheet = XLSX.utils.json_to_sheet(existingData);
          workbook.Sheets['Vouchers'] = newWorksheet;
          
          // Save the updated file
          XLSX.writeFile(workbook, file.name);
          
          alert('Data successfully added to existing Excel file!');
        } catch (error) {
          alert('Error reading existing file. Creating new file instead.');
          createNewExcelFile(data);
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      // No file selected, create new one
      createNewExcelFile(data);
    }
  };
  
  // Show file picker
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
};
